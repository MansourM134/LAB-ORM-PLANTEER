{# Usage: {% include "plants/includes/plant_card.html" with plant=plant %} #}
<a class="plant-card" href="{% url 'plants:plant_detail_view' plant_id=plant.id %}">
    <div class="plant-card-img">
        {% if plant.image %}
            <img src="{{ plant.image.url }}" alt="{{ plant.name }}">
        {% endif %}
    </div>
    <h3>{{ plant.name }}</h3>
    <p class="card-about">{{ plant.about|truncatewords:6 }}</p>
    <p class="card-category">{{ plant.get_category_display }}</p>
</a>
