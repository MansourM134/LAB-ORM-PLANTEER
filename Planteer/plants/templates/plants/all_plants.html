{% extends "main/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'plants/css/all_plants.css' %}">
{% endblock %}

{% block content %}

<div class="all-plants-page">
    <div class="plants-header">
        <h1 class="page-title">All Plants</h1>

        <form class="filters" method="GET" action="">
            <select class="filter-select" name="category" onchange="this.form.submit()">
                <option value="" {% if not selected_category %}selected{% endif %}>All Categories</option>
                {% for value, label in categories %}
                <option value="{{ value }}" {% if selected_category == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>

            <select class="filter-select" name="country" onchange="this.form.submit()">
            <option value="" {% if not selected_country %}selected{% endif %}>
                All Countries
            </option>
            {% for country in countries %}
                <option value="{{ country.id }}" {% if selected_country == country.id|stringformat:"s" %}selected{% endif %}>
                    {{ country.name }}
                </option>
            {% endfor %}
        </select>

            <select class="filter-select" name="edible" onchange="this.form.submit()">
                <option value="" {% if selected_edible == '' %}selected{% endif %}>Edible: All</option>
                <option value="true" {% if selected_edible == 'true' %}selected{% endif %}>Edible: Yes</option>
                <option value="false" {% if selected_edible == 'false' %}selected{% endif %}>Edible: No</option>
            </select>
        </form>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
        {% for plant in plants %}
        <div class="col">
            {% include "plants/includes/plant_card.html" with plant=plant %}
        </div>
        {% empty %}
        <div class="col-12">
            <div class="empty-state">
                <p>No plants found. <a href="{% url 'plants:plants_view' %}">Clear filters</a> or <a href="{% url 'plants:add_plants_view' %}">add one →</a></p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
